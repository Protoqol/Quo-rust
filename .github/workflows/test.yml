name: Rust
on:
  push:
    branches: [ "main" ]
    paths:
      - src/
      - Cargo.toml
  pull_request:
    branches: [ "main" ]
    paths:
      - src
      - Cargo.toml
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
      - name: Add wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown
      - name: Check compilation for wasm32-unknown-unknown
        run: cargo check --target wasm32-unknown-unknown --tests --verbose
